# CI for the claude-starter template repo itself (removed from spawned
# projects by start_project.sh — add your own project CI instead).
name: lint

on:
  push:
  pull_request:

jobs:
  scripts-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tests/run.sh verifies --update-stock against full git history

      - name: bash syntax check
        run: |
          shopt -s nullglob
          for f in *.sh scripts/*.sh .claude/hooks/*.sh tests/*.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shopt -s nullglob
          shellcheck -S warning *.sh scripts/*.sh .claude/hooks/*.sh tests/*.sh

      - name: harness regression suite (L1+L2)
        run: bash tests/run.sh

      - name: validate JSON
        run: |
          python3 -m json.tool .claude/settings.json > /dev/null
          python3 -m json.tool .mcp.json.example > /dev/null
