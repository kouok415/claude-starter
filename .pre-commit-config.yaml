# Mechanical enforcement of the rules that used to be prose-only.
# Install once per clone:  pre-commit install
# (start_project.sh does this automatically when pre-commit is available.)
repos:
  - repo: local
    hooks:
      - id: ai-context-state-size
        name: "S7: .ai_context/state.md <= 5 KB"
        entry: scripts/check-state-size.sh
        language: system
        files: ^\.ai_context/state\.md$
        pass_filenames: false

      - id: gitleaks-secret-scan
        name: "H1: no secrets (gitleaks)"
        entry: scripts/precommit-gitleaks.sh
        language: system
        pass_filenames: false

      - id: ai-context-append-only
        name: "append-only: decisions/journal/scoreboard/friction/gatelog"
        entry: scripts/check-append-only.sh
        language: system
        files: ^\.ai_context/(decisions\.md|scoreboard\.csv|friction\.csv|journal/.+\.md|tasks/.+/gatelog)$
        pass_filenames: false

      - id: ai-context-bulk
        name: "S2: no bulk dumps in .ai_context (<= 100 KB per file)"
        entry: scripts/check-context-bulk.sh
        language: system
        files: ^\.ai_context/
        pass_filenames: false
